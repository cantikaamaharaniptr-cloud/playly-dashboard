<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Playly • Tonton Video</title>
  <meta name="description" content="Tonton video dari Playly tanpa login."/>
  <meta name="theme-color" content="#1a0e10"/>
  <meta property="og:type" content="video.other"/>
  <meta property="og:site_name" content="Playly"/>
  <meta property="og:title" id="ogTitle" content="Playly Video"/>
  <meta property="og:description" id="ogDesc" content="Tonton video di Playly"/>
  <link rel="preconnect" href="https://ocsonstwwdnwjmhojntf.supabase.co" crossorigin/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a0e10;
      --bg-elev: #2a1418;
      --surface: #371b20;
      --border: rgba(255, 200, 170, 0.12);
      --text: #f1e4d6;
      --muted: #bfae9e;
      --primary: #C7B7A3;
      --grad: linear-gradient(135deg, #6D2932, #C7B7A3);
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(26, 14, 16, 0.9);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-logo {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--grad);
      display: grid; place-items: center;
      font-weight: 800; color: #1a0e10; font-size: 18px;
    }
    .brand strong { font-size: 16px; letter-spacing: -0.3px; }
    .brand small { display: block; font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .open-app {
      padding: 8px 16px;
      border-radius: 10px;
      background: var(--grad);
      color: #1a0e10;
      font-weight: 700;
      font-size: 13px;
      text-decoration: none;
      border: 0;
      cursor: pointer;
      transition: transform .15s;
    }
    .open-app:hover { transform: translateY(-1px); }

    .container {
      max-width: 1480px;   /* lebih lebar — perlu space buat side slots */
      margin: 0 auto;
      padding: 20px;
    }

    /* Watch layout: 3 kolom — side-left | video | side-right.
       Banner-side hanya tampil di desktop (≥ 1100px). Di bawah itu side
       columns hidden, layout collapse jadi single column. */
    .watch-layout {
      display: grid;
      grid-template-columns: minmax(180px, 240px) minmax(0, 1fr) minmax(180px, 240px);
      gap: 16px;
      align-items: start;
      max-width: 1480px;
      margin: 0 auto;
    }
    .watch-center { display: flex; flex-direction: column; gap: 14px; min-width: 0; }
    .banner-side {
      display: flex;
      flex-direction: column;
      gap: 16px;
      justify-content: space-between;
      min-height: 480px; /* reservasi tinggi 2 slot supaya layout stabil */
    }
    .banner-slot {
      width: 100%;
      aspect-ratio: 4 / 3;
      max-height: 220px;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e0608; /* dark fallback supaya kalau image lambat ada placeholder */
    }
    /* Slot kosong = invisible total — cuma slot yang dipilih tampil. */
    .banner-slot:empty {
      visibility: hidden;
      background: transparent;
    }
    /* Anchor (kalau banner punya linkUrl) jadi container 100% */
    .banner-slot a {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
    /* IMG di dalam slot SELALU full width × full height, baik yang nested
       di <a> maupun direct child. Bug sebelumnya: nested img tidak dapat
       dimensi karena selector cuma match direct child. */
    .banner-slot img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
    }
    .banner-slot .banner-tag-out {
      position: absolute;
      top: 8px; left: 8px;
      background: rgba(0,0,0,.7);
      color: #fff;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
      z-index: 2;
    }
    .banner-slot .banner-close-out {
      position: absolute;
      top: 6px; right: 6px;
      width: 26px; height: 26px;
      border-radius: 50%;
      background: rgba(0,0,0,.7);
      border: 1px solid rgba(255,255,255,.25);
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      display: grid;
      place-items: center;
      z-index: 2;
    }

    /* Running text bar — FULL VIEWPORT WIDTH (di luar .container).
       Membentang dari ujung kiri ke ujung kanan halaman. Marquee seamless:
       2 piece identik, animasi geser 0 → -50% jadi piece kedua nyambung
       tanpa gap. Infinite loop, tidak akan berhenti sampai tab/web ditutup. */
    .rt-overlay {
      width: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      min-height: 36px;
      white-space: nowrap;
      position: relative;
      z-index: 5;
    }
    .rt-overlay[hidden] { display: none !important; }
    .rt-marquee {
      display: inline-flex;
      flex-shrink: 0;
      white-space: nowrap;
      animation: rtScroll var(--rt-dur, 20s) linear infinite;
      animation-play-state: running !important;
      will-change: transform;
    }
    .rt-track {
      display: inline-block;
      padding-right: 4em;
      flex-shrink: 0;
    }
    @keyframes rtScroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .video-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    }
    .video-wrap video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #000;
    }
    .state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
      background: linear-gradient(135deg, #2a1418, #1a0e10);
    }
    .state[hidden] { display: none; }
    .state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.7; }
    .state h2 { font-size: 18px; margin-bottom: 6px; }
    .state p { font-size: 13px; color: var(--muted); max-width: 360px; line-height: 1.5; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .9s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .meta {
      margin-top: 18px;
      padding: 18px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .meta h1 {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .creator {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .creator .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--grad);
      display: grid; place-items: center;
      color: #1a0e10;
      font-weight: 700;
      font-size: 14px;
    }
    .creator b { font-size: 14px; }
    .creator small { display: block; color: var(--muted); font-size: 11.5px; }
    .desc {
      font-size: 13.5px;
      line-height: 1.55;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .footer-cta {
      margin-top: 20px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-align: center;
    }
    .footer-cta p { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    .footer-cta a {
      display: inline-block;
      padding: 10px 22px;
      border-radius: 10px;
      background: var(--grad);
      color: #1a0e10;
      font-weight: 700;
      font-size: 13.5px;
      text-decoration: none;
    }

    /* === ADS: Pre-roll overlay (di atas video) === */
    .preroll-overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      background: #000;
      display: grid;
      place-items: center;
    }
    .preroll-overlay[hidden] { display: none; }
    .preroll-overlay video,
    .preroll-overlay img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      display: block;
    }
    .preroll-overlay img[hidden],
    .preroll-overlay video[hidden] { display: none; }
    /* Click-through layer: invisible link di atas media buat klik → buka linkUrl */
    .preroll-clickarea {
      position: absolute;
      inset: 0;
      z-index: 5;
      cursor: pointer;
    }
    .preroll-clickarea[hidden] { display: none; }
    .preroll-info {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 14px;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(6px);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      z-index: 6;
      letter-spacing: 0.2px;
    }
    .preroll-tag {
      background: linear-gradient(135deg, #6D2932, #C7B7A3);
      color: #1a0e10;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 10.5px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .preroll-info button {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #fff;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 11.5px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }
    .preroll-info button:hover { background: rgba(255, 255, 255, 0.25); }
    .preroll-unmute {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 6;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #fff;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }
    .preroll-unmute[hidden] { display: none; }

    /* Responsive — collapse side columns di bawah 1100px (banner slots
       hidden, video full-width). Di mobile, kalau ada banner aktif kita
       fallback munculin satu banner inline DI BAWAH video. */
    @media (max-width: 1100px) {
      .watch-layout { grid-template-columns: 1fr; }
      .banner-side { display: none; }
    }
    .banner-mobile {
      display: none;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    .banner-mobile[hidden] { display: none; }
    .banner-mobile img { display: block; width: 100%; height: auto; }
    @media (max-width: 1100px) {
      .banner-mobile:not([hidden]) { display: block; }
    }

    @media (max-width: 600px) {
      .topbar { padding: 12px 14px; }
      .brand strong { font-size: 14px; }
      .brand-logo { width: 32px; height: 32px; font-size: 16px; }
      .container { padding: 12px; }
      .meta { padding: 14px; border-radius: 12px; }
      .meta h1 { font-size: 17px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="./" style="text-decoration:none;color:inherit">
      <span class="brand-logo">P</span>
      <div>
        <strong>Playly.</strong>
        <small>Video Platform</small>
      </div>
    </a>
    <a class="open-app" href="./" id="openAppBtn">Buka Aplikasi</a>
  </header>

  <!-- Running text bar — FULL VIEWPORT WIDTH, di luar .container.
       Membentang dari ujung kiri sampai ujung kanan halaman.
       Marquee infinite, tidak berhenti kecuali tab ditutup. -->
  <div class="rt-overlay" id="runningTextBar" hidden>
    <div class="rt-marquee" id="runningTextMarquee">
      <span class="rt-track" id="runningTextTrack"></span>
      <span class="rt-track" id="runningTextTrack2" aria-hidden="true"></span>
    </div>
  </div>

  <main class="container">
    <div class="watch-layout">
      <!-- Banner side LEFT — 2 slot (top + bottom) -->
      <aside class="banner-side left">
        <div class="banner-slot" data-slot="left-top"></div>
        <div class="banner-slot" data-slot="left-bottom"></div>
      </aside>

      <!-- Center: video + meta -->
      <div class="watch-center">
        <div class="video-wrap">
          <div class="state" id="loadingState">
            <div>
              <div class="spinner"></div>
              <h2>Memuat video...</h2>
              <p>Sebentar, kami sedang ambil video dari cloud.</p>
            </div>
          </div>
          <div class="state" id="errorState" hidden>
            <div>
              <div class="icon">⚠️</div>
              <h2 id="errTitle">Video tidak ditemukan</h2>
              <p id="errMsg">Link mungkin salah, video sudah dihapus, atau belum di-upload ke cloud.</p>
            </div>
          </div>
          <video id="videoEl" controls playsinline preload="metadata" hidden></video>
          <!-- Pre-roll overlay (sponsor/iklan sebelum video utama).
               Info badge "IKLAN 1/1" + skip button DIHAPUS per request user. -->
          <div class="preroll-overlay" id="prerollOverlay" hidden>
            <video id="prerollVideo" playsinline hidden></video>
            <img id="prerollImage" alt="Iklan" hidden/>
            <a class="preroll-clickarea" id="prerollClick" target="_blank" rel="noopener nofollow" hidden></a>
            <button class="preroll-unmute" id="prerollUnmute" type="button" hidden>🔊 Aktifkan suara</button>
          </div>
        </div>

        <!-- Banner mobile fallback (≤ 1100px) — satu banner di bawah video -->
        <div class="banner-mobile" id="bannerMobile" hidden>
          <a id="bannerMobileLink" target="_blank" rel="noopener nofollow"><img id="bannerMobileImg" alt="Banner iklan"/></a>
        </div>

        <div class="meta" id="metaBox" hidden>
          <h1 id="videoTitle">—</h1>
          <div class="creator">
            <div class="avatar" id="creatorInit">—</div>
            <div>
              <b id="creatorName">—</b>
              <small id="videoStats">—</small>
            </div>
          </div>
          <p class="desc" id="videoDesc"></p>
        </div>

        <div class="footer-cta">
          <p>Mau upload video atau interaksi sama kreator?</p>
          <a href="./" id="ctaBtn">Buka Playly →</a>
        </div>
      </div>

      <!-- Banner side RIGHT — 2 slot (top + bottom) -->
      <aside class="banner-side right">
        <div class="banner-slot" data-slot="right-top"></div>
        <div class="banner-slot" data-slot="right-bottom"></div>
      </aside>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      "use strict";
      const SB_URL = "https://ocsonstwwdnwjmhojntf.supabase.co";
      const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jc29uc3R3d2Rud2ptaG9qbnRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTk1NjcsImV4cCI6MjA5MjkzNTU2N30.ys8e3cGHOFrp2IONtbzsqRQeehOPfOt4CU3X0hHk6Tc";
      const BUCKET = "videos";

      const $ = (id) => document.getElementById(id);
      function showError(title, msg) {
        $("loadingState").hidden = true;
        $("errorState").hidden = false;
        if (title) $("errTitle").textContent = title;
        if (msg) $("errMsg").textContent = msg;
      }
      function fmtNum(n) {
        if (typeof n !== "number") return n || "0";
        if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
        if (n >= 1e3) return (n / 1e3).toFixed(1) + "k";
        return String(n);
      }

      // Vercel rewrite (`/id/:videoId` → `/watch.html?v=:videoId`) hanya jalan di
      // server-side. Di browser, location.search sering tetap kosong karena URL bar
      // menampilkan path asli. Karena itu kita parse videoId dari pathname lebih dulu,
      // baru fallback ke query string untuk akses langsung ke /watch.html?v=...
      function parseIdFromPath() {
        const parts = location.pathname.split("/").filter(Boolean);
        // /id/:videoId | /id/:videoId/embed | /id/:username/:videoId | /id/:username/:videoId/embed
        if (parts[0] !== "id") return { id: NaN, username: null };
        let username = null;
        let id = NaN;
        for (let i = 1; i < parts.length; i++) {
          const seg = parts[i];
          if (seg === "embed") continue;
          if (/^\d+$/.test(seg)) { id = parseInt(seg, 10); continue; }
          if (!username) username = seg;
        }
        return { id, username };
      }
      const params = new URLSearchParams(location.search);
      const fromPath = parseIdFromPath();
      const fromQuery = parseInt(params.get("v") || params.get("id") || "", 10);
      const videoId = Number.isFinite(fromPath.id) ? fromPath.id : fromQuery;
      const videoUsername = fromPath.username || params.get("u") || null;

      // Update CTA links: bawa video id sebagai query string supaya setelah
      // user login dari auth screen, dashboard auto-open video itu.
      // Tidak pakai `#video=` lagi karena legacy redirect script bakal mantulin
      // user balik ke /watch (loop).
      if (videoId) {
        const deep = `/?v=${videoId}`;
        $("openAppBtn").href = deep;
        $("ctaBtn").href = deep;
      }

      if (!videoId) {
        showError("Link tidak valid", "Video ID tidak ditemukan di URL.");
        return;
      }

      const sb = supabase.createClient(SB_URL, SB_KEY, { auth: { persistSession: false } });

      // 1) Cari metadata video: scan semua `playly-state-*` di kv → temukan myVideos.id
      async function findVideoMeta(id) {
        const { data, error } = await sb
          .from("kv")
          .select("key,value")
          .like("key", "playly-state-%");
        if (error) return null;
        for (const row of data || []) {
          const myVids = row.value && Array.isArray(row.value.myVideos) ? row.value.myVideos : [];
          const hit = myVids.find((v) => v && v.id === id);
          if (hit) {
            const username = String(row.key).replace("playly-state-", "");
            return { meta: hit, creator: hit.creator || username };
          }
        }
        return null;
      }

      // 2) Resolve URL video di bucket Supabase Storage (`videos/{id}.{mp4|webm|mov}`)
      //    Pakai signed URL: tiap akses URL beda + auto-expire 2 jam (anti-bajak,
      //    link tidak bisa di-hotlink permanen). Fallback ke public URL kalau
      //    bucket tidak support signed (misal bucket public-only / RLS off).
      async function resolveBlobUrl(id) {
        try {
          const { data: list } = await sb.storage.from(BUCKET).list("", { search: `${id}.` });
          const f = (list || []).find((x) => x.name && x.name.startsWith(`${id}.`));
          if (!f) return null;
          const SIGNED_TTL = 7200; // 2 jam
          const { data: signed, error: signErr } = await sb.storage
            .from(BUCKET).createSignedUrl(f.name, SIGNED_TTL);
          if (!signErr && signed?.signedUrl) return signed.signedUrl;
          const { data } = sb.storage.from(BUCKET).getPublicUrl(f.name);
          return data?.publicUrl || null;
        } catch {
          return null;
        }
      }

      function renderMeta(meta, creator) {
        $("videoTitle").textContent = meta.title || "Video";
        $("creatorName").textContent = "@" + creator;
        const init = String(creator || "U").slice(0, 2).toUpperCase();
        $("creatorInit").textContent = init;
        const stats = [];
        if (meta.views) stats.push(meta.views + " views");
        else if (typeof meta.viewsNum === "number") stats.push(fmtNum(meta.viewsNum) + " views");
        if (meta.duration) stats.push(meta.duration);
        if (meta.category) stats.push(meta.category);
        $("videoStats").textContent = stats.join(" • ") || "—";
        const descEl = $("videoDesc");
        if (meta.desc) descEl.textContent = meta.desc;
        else descEl.style.display = "none";
        $("metaBox").hidden = false;
        // Update OG / title
        document.title = `${meta.title} • @${creator} — Playly`;
        const og = $("ogTitle"); if (og) og.setAttribute("content", `${meta.title} • @${creator}`);
        const od = $("ogDesc"); if (od && meta.desc) od.setAttribute("content", String(meta.desc).slice(0, 200));
      }

      // === ADS: fetch config dari Supabase kv (admin set via Ad Manager dashboard) ===
      async function fetchAdConfig() {
        try {
          const { data, error } = await sb
            .from("kv")
            .select("value")
            .eq("key", "playly-ad-config")
            .maybeSingle();
          if (error) return null;
          return data?.value || null;
        } catch { return null; }
      }

      // Pilih max N preroll item — sesuai rotation (random / sequential).
      // Pre-roll bisa berupa video (videoUrl) atau gambar (imageUrl).
      function pickPrerolls(cfg, max) {
        const items = (cfg?.preroll?.items || []).filter(it => {
          if (!it.enabled) return false;
          if (it.mediaType === "image") return !!it.imageUrl;
          return !!it.videoUrl;
        });
        if (!items.length) return [];
        const rotation = cfg?.preroll?.rotation || "random";
        if (rotation === "random") {
          const shuffled = [...items].sort(() => Math.random() - 0.5);
          return shuffled.slice(0, max);
        }
        return items.slice(0, max);
      }

      // Pilih satu banner item — sesuai rotation.
      function pickBanner(cfg) {
        const items = (cfg?.banner?.items || []).filter(it => it.enabled && it.imageUrl);
        if (!items.length) return null;
        const rotation = cfg?.banner?.rotation || "random";
        if (rotation === "random") return items[Math.floor(Math.random() * items.length)];
        return items[0];
      }

      // Pilih satu running-text item — sesuai rotation. Tidak include "all"
      // karena marquee single-track lebih simpel & rapi (admin bisa stack
      // banyak text dengan separator manual kalau mau).
      function pickRunningText(cfg) {
        const items = (cfg?.runningText?.items || []).filter(it => it.enabled && it.text);
        if (!items.length) return null;
        const rotation = cfg?.runningText?.rotation || "random";
        if (rotation === "random") return items[Math.floor(Math.random() * items.length)];
        return items[0];
      }

      function playPrerollSequence(items, onDone) {
        if (!items.length) { onDone(); return; }
        const overlay = $("prerollOverlay");
        const v = $("prerollVideo");
        const img = $("prerollImage");
        const click = $("prerollClick");
        const unmuteBtn = $("prerollUnmute");
        let cur = 0;
        let imageTimer = null;
        let autoSkipTimer = null;

        function clearTimers() {
          if (imageTimer) { clearTimeout(imageTimer); imageTimer = null; }
          if (autoSkipTimer) { clearTimeout(autoSkipTimer); autoSkipTimer = null; }
        }

        function setupClickThrough(item) {
          if (item.linkUrl) {
            click.href = item.linkUrl;
            click.hidden = false;
          } else {
            click.removeAttribute("href");
            click.hidden = true;
          }
        }

        function playNext() {
          clearTimers();
          if (cur >= items.length) {
            overlay.hidden = true;
            v.pause();
            v.removeAttribute("src");
            v.load();
            v.hidden = true;
            img.hidden = true;
            img.removeAttribute("src");
            click.hidden = true;
            onDone();
            return;
          }
          const item = items[cur];
          const isImage = item.mediaType === "image";
          unmuteBtn.hidden = true;
          overlay.hidden = false;

          if (isImage) {
            // Mode gambar: tampilkan <img>, auto-advance setelah durationSec.
            v.pause();
            v.hidden = true;
            v.removeAttribute("src");
            v.load();
            img.src = item.imageUrl;
            img.hidden = false;
            setupClickThrough(item);
            const dur = Math.max(1, item.durationSec || 5) * 1000;
            imageTimer = setTimeout(() => { cur++; playNext(); }, dur);
          } else {
            // Mode video: pakai <video>
            img.hidden = true;
            img.removeAttribute("src");
            v.hidden = false;
            v.src = item.videoUrl;
            v.muted = true;
            v.play().then(() => {
              v.muted = false;
              v.play().catch(() => {
                v.muted = true;
                v.play().catch(() => {});
                unmuteBtn.hidden = false;
              });
            }).catch(() => {});
            setupClickThrough(item);
            v.onended = () => { cur++; playNext(); };
          }
        }

        unmuteBtn.onclick = () => {
          v.muted = false;
          v.play().catch(() => {});
          unmuteBtn.hidden = true;
        };

        playNext();
      }

      // Banner: pilih SATU random slot dari 4 (left-top/left-bottom/right-top/
      // right-bottom). Di mobile (≤ 1100px), side slots disembunyikan & banner
      // muncul di .banner-mobile di bawah video.
      function showBanner(item) {
        if (!item) return;
        const slots = document.querySelectorAll(".banner-slot");
        if (!slots.length) return;
        const targetIdx = Math.floor(Math.random() * slots.length);
        const slot = slots[targetIdx];

        // Build banner content di slot yg dipilih
        const linkAttrs = item.linkUrl ? `href="${item.linkUrl}" target="_blank" rel="noopener nofollow"` : "";
        const closable = item.closable !== false;
        slot.innerHTML = `
          <span class="banner-tag-out">Iklan</span>
          ${closable ? `<button class="banner-close-out" type="button" aria-label="Tutup">✕</button>` : ""}
          ${item.linkUrl
            ? `<a ${linkAttrs}><img src="${item.imageUrl}" alt="Banner iklan"/></a>`
            : `<img src="${item.imageUrl}" alt="Banner iklan"/>`}
        `;
        if (closable) {
          const closeBtn = slot.querySelector(".banner-close-out");
          if (closeBtn) closeBtn.onclick = () => { slot.innerHTML = ""; };
        }

        // Mobile fallback — sama image, render di .banner-mobile
        const mobBox = $("bannerMobile");
        const mobImg = $("bannerMobileImg");
        const mobLink = $("bannerMobileLink");
        if (mobImg && mobBox) {
          mobImg.src = item.imageUrl;
          if (item.linkUrl) {
            mobLink.href = item.linkUrl;
            mobLink.style.pointerEvents = "auto";
          } else {
            mobLink.removeAttribute("href");
            mobLink.style.pointerEvents = "none";
          }
        }

        const delay = Math.max(0, (item.showAfterSec || 0) * 1000);
        setTimeout(() => {
          slot.style.display = "flex";
          if (mobBox) mobBox.hidden = false;
        }, delay);
      }

      // Running text: render full-viewport-width marquee di atas video.
      // 2 track duplikat untuk seamless infinite loop — animasi geser
      // 0 → -50% pas piece kedua di posisi piece pertama, jadi nggak ada
      // jeda. Loop infinite via CSS animation, tidak berhenti sampai tab
      // ditutup.
      function showRunningText(item) {
        if (!item || !item.text) return;
        const bar = $("runningTextBar");
        const marquee = $("runningTextMarquee");
        const track1 = $("runningTextTrack");
        const track2 = $("runningTextTrack2");
        if (!bar || !track1 || !track2 || !marquee) return;

        track1.textContent = item.text;
        track2.textContent = item.text;

        // Background dengan opacity
        const opacity = (Number(item.bgOpacity) || 0) / 100;
        const bgColor = item.bgColor || "#000000";
        const r = parseInt(bgColor.slice(1,3), 16);
        const g = parseInt(bgColor.slice(3,5), 16);
        const b = parseInt(bgColor.slice(5,7), 16);
        bar.style.backgroundColor = `rgba(${r},${g},${b},${opacity})`;
        bar.style.color = item.textColor || "#ffffff";
        bar.style.padding = `${item.padding != null ? item.padding : 8}px 0`;

        // Font styling — apply ke marquee container supaya inherit ke kedua track
        marquee.style.fontFamily = (item.fontFamily || "Inter") + ", sans-serif";
        marquee.style.fontSize = (item.fontSize || 14) + "px";
        marquee.style.fontWeight = item.fontWeight || 600;
        marquee.style.fontStyle = item.italic ? "italic" : "normal";

        bar.hidden = false;

        // Hitung durasi animasi dari lebar piece sebenarnya. Tanpa ini,
        // estimasi 1500px scroll bisa nggak match → text potong di tengah.
        // speed = px/detik (default 80, range 20-400).
        const speedPxPerSec = Math.max(20, Math.min(400, Number(item.speed) || 80));
        const measure = () => {
          const pieceW = track1.getBoundingClientRect().width;
          if (pieceW < 20) return;
          const rawDur = pieceW / speedPxPerSec;
          const dur = Math.max(8, Math.min(90, rawDur));
          marquee.style.setProperty("--rt-dur", dur + "s");
        };
        requestAnimationFrame(measure);
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(() => requestAnimationFrame(measure)).catch(() => {});
        }
        if (window.ResizeObserver) {
          const ro = new ResizeObserver(() => measure());
          ro.observe(track1);
        }
      }

      (async function load() {
        try {
          // Fetch metadata video & ad config paralel
          const adCfgPromise = fetchAdConfig();
          const found = await findVideoMeta(videoId);
          if (!found) {
            showError("Video tidak ditemukan", "Video ID tidak dikenali. Mungkin sudah dihapus atau belum di-publish.");
            return;
          }
          renderMeta(found.meta, found.creator);

          // Sumber video: prioritas `videoUrl` di metadata (kalau https), lalu cari di bucket
          let url = null;
          if (found.meta.videoUrl && /^https?:/.test(found.meta.videoUrl)) {
            url = found.meta.videoUrl;
          } else {
            url = await resolveBlobUrl(videoId);
          }
          if (!url) {
            showError("Video belum tersedia", "File video belum di-upload ke cloud, jadi belum bisa diputar tanpa login.");
            return;
          }

          const v = $("videoEl");
          v.src = url;

          // Tunggu ad config (max 2 detik — kalau lambat, skip iklan dan langsung putar)
          const adCfg = await Promise.race([
            adCfgPromise,
            new Promise(r => setTimeout(() => r(null), 2000))
          ]);

          $("loadingState").hidden = true;

          const prerolls = pickPrerolls(adCfg, 2);
          const banner = pickBanner(adCfg);
          const rtItem = pickRunningText(adCfg);

          // Running text muncul SEKARANG juga (tidak tunggu video play),
          // supaya user tetap lihat marquee jalan walaupun preroll lagi muter.
          if (rtItem) showRunningText(rtItem);

          function startMain() {
            v.hidden = false;
            v.muted = true;
            v.play().catch(() => {});
            if (banner) showBanner(banner);
          }

          if (prerolls.length) {
            playPrerollSequence(prerolls, startMain);
          } else {
            startMain();
          }
        } catch (e) {
          console.warn(e);
          showError("Gagal memuat video", "Coba refresh halaman atau periksa koneksi internet.");
        }
      })();
    })();
  </script>
</body>
</html>
